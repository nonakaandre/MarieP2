<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="55%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#141b26"/>
    </radialGradient>

    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(139, 92, 246, 0.25)"/>
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.08)"/>
    </linearGradient>

    <linearGradient id="stampGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="50%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <pattern id="starsPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="0.7" fill="rgba(148,163,184,0.25)"/>
      <circle cx="24" cy="18" r="0.5" fill="rgba(148,163,184,0.18)"/>
      <circle cx="33" cy="4" r="0.6" fill="rgba(148,163,184,0.2)"/>
      <circle cx="14" cy="30" r="0.5" fill="rgba(148,163,184,0.15)"/>
      <circle cx="36" cy="34" r="0.7" fill="rgba(148,163,184,0.22)"/>
    </pattern>
  </defs>

  <!-- Corpo da carta -->
  <rect x="4" y="4" width="192" height="272" rx="14" fill="url(#bgGradient)" stroke="url(#borderGradient)" stroke-width="2"/>

  <!-- Textura de estrelas apagada -->
  <rect x="4" y="4" width="192" height="272" rx="14" fill="url(#starsPattern)"/>

  <!-- Moldura interna sutil -->
  <rect x="14" y="14" width="172" height="252" rx="10" fill="none" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Ícone de cadeado central, apagado -->
  <g transform="translate(100, 118)" opacity="0.35">
    <rect x="-22" y="-4" width="44" height="34" rx="6" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <path d="M -13 -4 L -13 -18 A 13 13 0 0 1 13 -18 L 13 -4" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="13" r="4" fill="#9ca3af"/>
    <rect x="-1.5" y="15" width="3" height="8" fill="#9ca3af"/>
  </g>

  <!-- Overlay escurecido -->
  <rect x="4" y="4" width="192" height="272" rx="14" fill="#0f172a" opacity="0.45"/>

  <!-- Selo diagonal "USADA" -->
  <g transform="translate(100, 195) rotate(-18)">
    <rect x="-78" y="-16" width="156" height="32" rx="4" fill="url(#stampGradient)" opacity="0.92" filter="url(#softBlur)"/>
    <rect x="-78" y="-16" width="156" height="32" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
    <text x="0" y="7" text-anchor="middle" font-family="Orbitron, sans-serif" font-size="18" font-weight="700" fill="#e5e7eb" letter-spacing="3">USADA</text>
  </g>

  <!-- Brilho sutil no topo, quase apagado -->
  <ellipse cx="100" cy="30" rx="70" ry="18" fill="rgba(139, 92, 246, 0.06)" filter="url(#softBlur)"/>
</svg>
